name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CI: "true"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.29.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@latest

      - name: Show tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        run: pnpm release:tag-check "${{ github.ref_name }}"

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Pack check
        run: pnpm pack:check

      - name: Publish dry run
        run: pnpm release:dry-run

  publish:
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.29.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        run: pnpm release:tag-check "${{ github.ref_name }}"

      - name: Build
        run: pnpm build

      - name: Publish workspace packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm release:publish

      - name: Upload publish summary
        if: always() && hashFiles('pnpm-publish-summary.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: npm-publish-summary
          path: pnpm-publish-summary.json
          if-no-files-found: ignore
